<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Mi Primer Piloto RA</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="mi-imagen" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Python-logo-notext.svg/1200px-Python-logo-notext.svg.png">
      </a-assets>

      <a-marker preset="hiro">
        <a-image 
          src="#mi-imagen" 
          position="0 0.2 0" 
          rotation="-90 0 0" 
          width="1.5" 
          height="1.5">
        </a-image>
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
    
  </body>
</html>
